name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Dummy values sufficient for `prisma generate` (schema validation only,
      # no live connection needed) and for the API to boot for typecheck/build.
      # Real secrets are never used in CI.
      DATABASE_URL: "postgresql://clinic:clinic@localhost:5432/digital_clinic?schema=public"
      JWT_ACCESS_SECRET: "ci-only-access-secret"
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "30d"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      # No pnpm-lock.yaml is committed yet (first `pnpm install` hasn't been run
      # anywhere with pnpm available) — switch this to `pnpm install --frozen-lockfile`
      # once one exists, so CI catches an out-of-date lockfile instead of silently
      # re-resolving it.
      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
